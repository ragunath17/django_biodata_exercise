<!DOCTYPE html>
<html>
<body>

<h1>Add BioData</h1>

<form method="post">
    {% csrf_token %}

    <label>First Name:</label>
    <input type="text" name="first_name"><br><br>

    <label>Last Name:</label>
    <input type="text" name="last_name"><br><br>

    <label>Gender:</label>
    <input type="text" name="gender"><br><br>

    <label>Date of Birth:</label>
    <input type="date" name="date_of_birth"><br><br>

    <label>Age:</label>
    <input type="number" name="age"><br><br>

    <label>Marital Status:</label>
    <input type="text" name="marital_status"><br><br>

    <label>Nationality:</label>
    <input type="text" name="nationality"><br><br>

    <label>Email:</label>
    <input type="email" name="email"><br><br>

    <label>Phone Number:</label>
    <input type="text" name="phone_number"><br><br>

    <label>Alternate Phone Number:</label>
    <input type="text" name="alternate_phone_number"><br><br>

    <label>Address Line 1:</label>
    <input type="text" name="address_line_1"><br><br>

    <label>Address Line 2:</label>
    <input type="text" name="address_line_2"><br><br>

    <label>City:</label>
    <input type="text" name="city"><br><br>

    <label>State:</label>
    <input type="text" name="state"><br><br>

    <label>Country:</label>
    <input type="text" name="country"><br><br>

    <label>Zip Code:</label>
    <input type="text" name="zip_code"><br><br>

    <label>Postal Code:</label>
    <input type="text" name="postal_code"><br><br>

    <label>Height:</label>
    <input type="text" name="height"><br><br>

    <label>Weight:</label>
    <input type="text" name="weight"><br><br>

    <label>Blood Group:</label>
    <input type="text" name="blood_group"><br><br>

    <label>Highest Qualification:</label>
    <input type="text" name="highest_qualification"><br><br>

    <label>University Name:</label>
    <input type="text" name="university_name"><br><br>

    <label>Year of Passing:</label>
    <input type="number" name="year_of_passing"><br><br>

    <label>Occupation:</label>
    <input type="text" name="occupation"><br><br>

    <label>Company Name:</label>
    <input type="text" name="company_name"><br><br>

    <label>Job Title:</label>
    <input type="text" name="job_title"><br><br>

    <label>Years of Experience:</label>
    <input type="number" name="years_of_experience"><br><br>

    <label>Expected Salary:</label>
    <input type="number" name="expected_salary"><br><br>

    <label>Website:</label>
    <input type="url" name="website"><br><br>

    <label>LinkedIn Profile:</label>
    <input type="url" name="linkedin_profile"><br><br>

    <label>GitHub Profile:</label>
    <input type="url" name="github_profile"><br><br>

    <label>Skills:</label>
    <textarea name="skills"></textarea><br><br>

    <label>Languages Known:</label>
    <textarea name="languages_known"></textarea><br><br>

    <label>Is Active:</label>
    <input type="checkbox" name="is_active" checked><br><br>

    <button type="submit">Submit</button>
</form>

<br>
<a href="/biodata/template_list/">Back to list</a>

</body>
</html>
